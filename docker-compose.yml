services:
  db:
    image: pgvector/pgvector:pg16
    container_name: tazkera-db
    environment:
      POSTGRES_DB: tazkera
      POSTGRES_USER: tazkera
      POSTGRES_PASSWORD: tazkera_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  odoo-db:
    image: postgres:16
    container_name: odoo-db
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_dev
    volumes:
      - odoo-pgdata:/var/lib/postgresql/data

  odoo:
    image: odoo:17.0
    container_name: odoo
    depends_on:
      - odoo-db
    ports:
      - "8069:8069"
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo_dev
    volumes:
      - odoo-data:/var/lib/odoo

volumes:
  pgdata:
  odoo-pgdata:
  odoo-data: